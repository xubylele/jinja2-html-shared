name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  ci:
    name: Test & Changeset Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Fail if changeset files exist (PR → main)
        if: github.base_ref == 'main'
        run: |
          files=$(find .changeset -name "*.md" ! -name "README.md")
          if [ -n "$files" ]; then
            echo "::error::Changeset files found. Consume them before merging to ${{ github.base_ref }}."
            echo "$files"
            exit 1
          fi

      - name: Fail if no changeset (PR → develop)
        if: github.base_ref == 'develop'
        run: npm run changeset:check

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Publish to npm
        run: npm publish --access public --provenance
