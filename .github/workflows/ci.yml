name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  ci:
    name: Test & Changeset Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:ci

      - name: Fail if changeset files exist (PR → main)
        if: github.base_ref == 'main'
        run: |
          files=$(find .changeset -name "*.md" ! -name "README.md")
          if [ -n "$files" ]; then
            echo "::error::Changeset files found. Consume them before merging to ${{ github.base_ref }}."
            echo "$files"
            exit 1
          fi

      - name: Fail if no changeset (PR → develop)
        if: github.base_ref == 'develop'
        run: pnpm changeset:check
